<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Random Joke Generator</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            justify-content: center;\n            height: 100vh;\n            background-color: #f4f4f4;\n        }\n        #joke {\n            margin: 20px;\n            padding: 20px;\n            border: 1px solid #ddd;\n            border-radius: 5px;\n            background: white;\n            width: 300px;\n            text-align: center;\n        }\n        button {\n            padding: 10px 15px;\n            font-size: 16px;\n            cursor: pointer;\n        }\n    </style>\n</head>\n<body>\n    <div id=\"joke\">Press the button to get a joke!</div>\n    <button id=\"jokeBtn\">Get New Joke</button>\n    <script>\n        document.getElementById('jokeBtn').addEventListener('click', fetchJoke);\n\n        function fetchJoke() {\n            fetch('https://v2.jokeapi.dev/joke/Any')\n                .then(response => response.json())\n                .then(data => {\n                    const jokeDiv = document.getElementById('joke');\n                    if (data.joke) {\n                        jokeDiv.innerHTML = data.joke;\n                    } else {\n                        jokeDiv.innerHTML = data.setup + ' - ' + data.delivery;\n                    }\n                })\n                .catch(error => {\n                    console.error('Error fetching joke:', error);\n                    document.getElementById('joke').innerHTML = 'Sorry, couldn\'t fetch a joke.';\n                });\n        }\n    </script>\n</body>\n</html>
